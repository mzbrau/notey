name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Notey.slnx

      - name: Build
        run: dotnet build Notey.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Notey.slnx --configuration Release --no-build --logger "console;verbosity=minimal"

      - name: Publish Windows folder
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/publish-windows.ps1 -Configuration Release -RuntimeIdentifier win-x64 -OutputPath artifacts/publish/Notey-win-x64

      - name: Upload Windows artifact
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: Notey-win-x64
          path: artifacts/publish/Notey-win-x64
